<html lang="en">
<head>
<meta charset="utf-8">
<title>Christian Story — Scene Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #14110f;
    --card-bg: #1e1a17;
    --border: #33291f;
    --text: #f0e6d8;
    --muted: #b8a88f;
    --accent: #c9973f;
    --lane-archival: #c9973f;
    --lane-stock: #4fa8a0;
    --lane-graphic: #8b7cc9;
    --lane-krea: #c0654a;
    --mood: #5fb26a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    padding: 32px 24px 64px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--accent);
  }
  p.sub {
    margin: 0 0 28px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    margin: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }
  .card.mood-designated {
    border-color: var(--mood);
    box-shadow: 0 0 0 1px var(--mood);
  }
  .mood-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: var(--mood);
    color: #0d1a0f;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #0c0a08;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb .missing {
    color: #8a5a4a;
    font-size: 0.85rem;
    font-style: italic;
  }
  .badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.65);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  figcaption {
    padding: 12px 14px 16px;
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text);
  }
  figcaption .scene-type {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  figcaption .basis {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    line-height: 1.4;
  }
  figcaption .basis-label {
    color: var(--accent);
    font-style: normal;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
  }
  .lane-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #14110f;
    background: var(--muted);
  }
  .thumb .lane-badge {
    position: absolute;
    top: 8px;
    right: 8px;
  }
  .lane-badge.lane-archival { background: var(--lane-archival); }
  .lane-badge.lane-stock { background: var(--lane-stock); }
  .lane-badge.lane-graphic-map { background: var(--lane-graphic); }
  .lane-badge.lane-graphic-document { background: var(--lane-graphic); }
  .lane-badge.lane-krea { background: var(--lane-krea); }
  .lane-badge.lane-none { background: var(--muted); color: var(--bg); }

  /* Modal / lightbox */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 5vh 4vw;
  }
  #modal.open { display: flex; }
  #modal .modal-inner {
    max-width: 1100px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  #modal img {
    max-width: 100%;
    max-height: 68vh;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  #modal .caption {
    color: var(--text);
    font-size: 1rem;
    line-height: 1.6;
    max-width: 800px;
    text-align: center;
  }
  #modal .scene-num {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.8rem;
    margin-bottom: 4px;
  }
  #modal .modal-meta {
    color: var(--muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  #modal .modal-basis {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    line-height: 1.5;
    max-width: 800px;
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  #modal .modal-basis .basis-label {
    color: var(--accent);
    font-style: normal;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 0.75rem;
  }
  #modal .close {
    position: absolute;
    top: 20px;
    right: 28px;
    color: var(--text);
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }
  #modal .close:hover { color: var(--accent); }
</style>
</head>

  var modal = document.getElementById('modal');
  var modalImg = document.getElementById('modal-img');
  var modalCaption = document.getElementById('modal-caption');
  var modalSceneNum = document.getElementById('modal-scene-num');
  var modalLane = document.getElementById('modal-lane');
  var modalMeta = document.getElementById('modal-meta');
  var modalBasis = document.getElementById('modal-basis');
  var modalMood = document.getElementById('modal-mood');

  function openModal(idx) {
    var s = SCENES[idx];
    if (!s || !s.url) return;
    modalImg.src = s.url;
    modalImg.alt = 'Scene ' + s.n;
    modalCaption.textContent = s.snippet;
    modalSceneNum.textContent = 'Scene ' + s.n;
    modalLane.className = 'lane-badge ' + (s.lane ? 'lane-' + s.lane : 'lane-none');
    modalLane.textContent = s.lane || '—';
    modalMood.style.display = s.mood_designated ? '' : 'none';
    var metaParts = [];
    if (s.scene_type) metaParts.push(s.scene_type);
    modalMeta.textContent = metaParts.join(' · ');
    if (s.image_basis) {
      var label = s.basis_kind === 'search' ? 'Search' : 'Prompt';
      modalBasis.textContent = '';
      var labelSpan = document.createElement('span');
      labelSpan.className = 'basis-label';
      labelSpan.textContent = label + ': ';
      modalBasis.appendChild(labelSpan);
      modalBasis.appendChild(document.createTextNode(s.image_basis));
      modalBasis.style.display = '';
    } else {
      modalBasis.textContent = '';
      modalBasis.style.display = 'none';
    }
    modal.classList.add('open');
  }

  function closeModal() {
    modal.classList.remove('open');
    modalImg.src = '';
  }

  document.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('click', function() {
      openModal(parseInt(card.getAttribute('data-idx'), 10));
    });
  });

  document.querySelector('#modal .close').addEventListener('click', closeModal);

  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });
