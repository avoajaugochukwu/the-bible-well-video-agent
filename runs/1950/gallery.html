<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Heritage Decoded — Scene Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #14110f;
    --card-bg: #1e1a17;
    --border: #33291f;
    --text: #f0e6d8;
    --muted: #b8a88f;
    --accent: #c9973f;
    --lane-archival: #c9973f;
    --lane-stock: #4fa8a0;
    --lane-graphic: #8b7cc9;
    --lane-krea: #c0654a;
    --mood: #5fb26a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    padding: 32px 24px 64px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--accent);
  }
  p.sub {
    margin: 0 0 28px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    margin: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }
  .card.mood-designated {
    border-color: var(--mood);
    box-shadow: 0 0 0 1px var(--mood);
  }
  .mood-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: var(--mood);
    color: #0d1a0f;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #0c0a08;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb .missing {
    color: #8a5a4a;
    font-size: 0.85rem;
    font-style: italic;
  }
  .badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.65);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  figcaption {
    padding: 12px 14px 16px;
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text);
  }
  figcaption .scene-type {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  figcaption .named-entity {
    margin-top: 2px;
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
  }
  figcaption .basis {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    line-height: 1.4;
  }
  figcaption .basis-label {
    color: var(--accent);
    font-style: normal;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
  }
  .lane-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #14110f;
    background: var(--muted);
  }
  .thumb .lane-badge {
    position: absolute;
    top: 8px;
    right: 8px;
  }
  .lane-badge.lane-archival { background: var(--lane-archival); }
  .lane-badge.lane-stock { background: var(--lane-stock); }
  .lane-badge.lane-graphic-map { background: var(--lane-graphic); }
  .lane-badge.lane-graphic-document { background: var(--lane-graphic); }
  .lane-badge.lane-krea { background: var(--lane-krea); }
  .lane-badge.lane-none { background: var(--muted); color: var(--bg); }

  /* Modal / lightbox */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 5vh 4vw;
  }
  #modal.open { display: flex; }
  #modal .modal-inner {
    max-width: 1100px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  #modal img {
    max-width: 100%;
    max-height: 68vh;
    object-fit: contain;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  #modal .caption {
    color: var(--text);
    font-size: 1rem;
    line-height: 1.6;
    max-width: 800px;
    text-align: center;
  }
  #modal .scene-num {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.8rem;
    margin-bottom: 4px;
  }
  #modal .modal-meta {
    color: var(--muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  #modal .modal-basis {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    line-height: 1.5;
    max-width: 800px;
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  #modal .modal-basis .basis-label {
    color: var(--accent);
    font-style: normal;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 0.75rem;
  }
  #modal .close {
    position: absolute;
    top: 20px;
    right: 28px;
    color: var(--text);
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }
  #modal .close:hover { color: var(--accent); }
</style>
</head>
<body>
  <h1>Heritage Decoded — Scene Gallery</h1>
  <p class="sub">304 scenes, 0 marked
    <span style="color: var(--mood); font-weight: 700;">CULTURAL ANCHOR</span>
    (code-picked mood/establishing scenes). Click any image to view full size.</p>
  <div class="grid">
        <figure class="card" data-idx="0">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JRA28E25C9GDQ7AVAZ3VC/0.png" alt="Scene 1" loading="lazy"><span class="badge">1</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>In a quiet farmhouse in Lancaster County, Pennsylvania, the lamps in one bedroom never turn off at night.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, wooden bedside lamp on nightstand in Lancaster County farmhouse bedroom, contemporary</div></figcaption>
        </figure>
        <figure class="card" data-idx="1">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JRA5YBFBJ9GQTY2FMP690/0.png" alt="Scene 2" loading="lazy"><span class="badge">2</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>They are not the warm yellow glow you would expect over a sleeping child.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, ceramic bedside lamp with shade in farmhouse bedroom, Lancaster County, contemporary</div></figcaption>
        </figure>
        <figure class="card" data-idx="2">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JR9S4DRB1GVG57390B738/0.png" alt="Scene 3" loading="lazy"><span class="badge">3</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>They are a deep, electric blue.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, antique metal lamp with blue glass shade on farmhouse nightstand, Lancaster County, contemporary</div></figcaption>
        </figure>
        <figure class="card" data-idx="3">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JR9WC5H2E702TZMXV2QGM/0.png" alt="Scene 4" loading="lazy"><span class="badge">4</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>And under that blue light, a little girl is sleeping, the same way she sleeps every single night, the same way she will sleep for years to come.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, little girl sleeping in wooden bed with handmade quilt in Lancaster County farmhouse bedroom, contemporary</div></figcaption>
        </figure>
        <figure class="card" data-idx="4">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JR9QW6X8ZEQ2XPFD2TFQA/0.png" alt="Scene 5" loading="lazy"><span class="badge">5</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>If those lights fail,<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, blue bedside lamp with visible unplugged cord on nightstand in Lancaster County farmhouse bedroom, contemporary</div></figcaption>
        </figure>
        <figure class="card" data-idx="5">
          <div class="thumb"><img src="https://images.pexels.com/photos/37383973/pexels-photo-37383973.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 6" loading="lazy"><span class="badge">6</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>if the power goes out on the farm for too long,<div class="scene-type">geographic</div><div class="basis basis-search"><span class="basis-label">Search:</span> Lancaster County red bank barn exterior evening</div></figcaption>
        </figure>
        <figure class="card" data-idx="6">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JRA0P9H5YFY93BZ1NXRFQ/0.png" alt="Scene 7" loading="lazy"><span class="badge">7</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>if the family forgets even once, the result is not a bad night of rest.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, weathered farmhouse kitchen table with empty chair on Lancaster County farm, contemporary</div></figcaption>
        </figure>
        <figure class="card" data-idx="7">
          <div class="thumb"><img src="https://images.pexels.com/photos/7088483/pexels-photo-7088483.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 8" loading="lazy"><span class="badge">8</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>The result can be permanent brain damage.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> medical chart clipboard rural clinic Lancaster County</div></figcaption>
        </figure>
        <figure class="card" data-idx="8">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JRA4PQQS2ZR45JW3K6ZGE/0.png" alt="Scene 9" loading="lazy"><span class="badge">9</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>It can be death.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, empty plain wooden cradle on farmhouse floor in Lancaster County bedroom, contemporary</div></figcaption>
        </figure>
        <figure class="card" data-idx="9">
          <div class="thumb"><img src="https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-archival/d22924212c64284ea02b20efdbf08c9f.jpg" alt="Scene 10" loading="lazy"><span class="badge">10</span><span class="lane-badge lane-archival">archival</span></div>
          <figcaption>This is not a punishment.<div class="scene-type">geographic</div><div class="named-entity">Lancaster County</div><div class="basis basis-search"><span class="basis-label">Search:</span> Lancaster County white farmhouse with horse and buggy</div></figcaption>
        </figure>
        <figure class="card" data-idx="10">
          <div class="thumb"><img src="https://images.pexels.com/photos/14553829/pexels-photo-14553829.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 11" loading="lazy"><span class="badge">11</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>It is not an experiment.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> hospital blue phototherapy lamp 1990s</div></figcaption>
        </figure>
        <figure class="card" data-idx="11">
          <div class="thumb"><img src="https://images.pexels.com/photos/13060613/pexels-photo-13060613.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 12" loading="lazy"><span class="badge">12</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>It is medicine.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> vintage metal medical tray with ampoules 1980s</div></figcaption>
        </figure>
        <figure class="card" data-idx="12">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JRCGM5BW4QH76KZYB5GST/0.png" alt="Scene 13" loading="lazy"><span class="badge">13</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>And for a small number of Amish and Mennonite children scattered across Pennsylvania, this blue light is the thin thread that holds their entire life together.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, Blue phototherapy lamp positioned over a wooden crib in an Amish farmhouse bedroom, Lancaster County, 1980s-2000s.</div></figcaption>
        </figure>
        <figure class="card" data-idx="13">
          <div class="thumb"><img src="https://images.pexels.com/photos/35967917/pexels-photo-35967917.png?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 14" loading="lazy"><span class="badge">14</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>So how does a single tiny error, written into just one gene,<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> DNA double helix model with point mutation</div></figcaption>
        </figure>
        <figure class="card" data-idx="14">
          <div class="thumb"><img src="https://images.pexels.com/photos/34185235/pexels-photo-34185235.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 15" loading="lazy"><span class="badge">15</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption> force a child to sleep under lights built for a hospital ward?<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> pediatric phototherapy lamp above hospital bed</div></figcaption>
        </figure>
        <figure class="card" data-idx="15">
          <div class="thumb"><img src="https://images.pexels.com/photos/32678634/pexels-photo-32678634.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 16" loading="lazy"><span class="badge">16</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>Why does this rare condition, which barely exists anywhere else on the planet, keep appearing again and again in these Plain farming communities?<div class="scene-type">geographic</div><div class="basis basis-search"><span class="basis-label">Search:</span> Amish farmhouse with red bank barn Lancaster County</div></figcaption>
        </figure>
        <figure class="card" data-idx="16">
          <div class="thumb"><img src="https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-archival/a80db286363773c6b690a30164cc6019.jpg" alt="Scene 17" loading="lazy"><span class="badge">17</span><span class="lane-badge lane-archival">archival</span></div>
          <figcaption>And what does a small clinic, sitting in a field in a town called Strasburg, have to do with saving these children&#x27;s lives?<div class="scene-type">geographic</div><div class="named-entity">Strasburg</div><div class="basis basis-search"><span class="basis-label">Search:</span> small rural clinic building Strasburg Pennsylvania</div></figcaption>
        </figure>
        <figure class="card" data-idx="17">
          <div class="thumb"><img src="https://images.pexels.com/photos/3908181/pexels-photo-3908181.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 18" loading="lazy"><span class="badge">18</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>To understand the blue lights, we have to start with something your own body is doing right now, quietly, as you watch this.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> blood smear slide red blood cells 1990s lab</div></figcaption>
        </figure>
        <figure class="card" data-idx="18">
          <div class="thumb"><img src="https://images.pexels.com/photos/4230622/pexels-photo-4230622.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 19" loading="lazy"><span class="badge">19</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>Every second of every day, your body is taking apart old blood.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> vial of blood and medical gauze 1990s lab</div></figcaption>
        </figure>
        <figure class="card" data-idx="19">
          <div class="thumb"><img src="https://images.pexels.com/photos/3908181/pexels-photo-3908181.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 20" loading="lazy"><span class="badge">20</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>Your red blood cells do not last forever.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> red blood cell blood smear microscope slide 1980s</div></figcaption>
        </figure>
        <figure class="card" data-idx="20">
          <div class="thumb"><img src="https://images.pexels.com/photos/7691972/pexels-photo-7691972.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 21" loading="lazy"><span class="badge">21</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>They live for only a few months, and then they wear out, and your body breaks them down and recycles the pieces. It is a tidy, constant process, happening inside you by the billions.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> stained blood smear macrophage and red blood cells 1980s</div></figcaption>
        </figure>
        <figure class="card" data-idx="21">
          <div class="thumb"><img src="https://images.pexels.com/photos/10514991/pexels-photo-10514991.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 22" loading="lazy"><span class="badge">22</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>But one of the leftover scraps from that recycling is a yellow-orange pigment, and that pigment has a name. It is called bilirubin.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> amber vial bilirubin pigment sample 1990s lab</div></figcaption>
        </figure>
        <figure class="card" data-idx="22">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JTFDF6KWV0FXYGP30J2RJ/0.png" alt="Scene 23" loading="lazy"><span class="badge">23</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>Bilirubin is completely normal. Everyone makes it, all day long. In fact, you have seen it with your own eyes.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, Amish-area newborn with mild jaundice, yellow-tinged skin, wrapped in plain cotton blanket, contemporary Lancaster County</div></figcaption>
        </figure>
        <figure class="card" data-idx="23">
          <div class="thumb"><img src="https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JTFR80EEFYMYJF98T8CZH/0.png" alt="Scene 24" loading="lazy"><span class="badge">24</span><span class="lane-badge lane-krea">krea</span></div>
          <figcaption>It is the same pigment that gives an old bruise that sickly yellow-green color as it fades and heals.<div class="scene-type">historical_dramatic</div><div class="basis basis-prompt"><span class="basis-label">Prompt:</span> cinematic 35mm film still, historical realism, rich organic textures, Close-up of faded yellow-green bruise on adult forearm, 1980s Pennsylvania clinic.</div></figcaption>
        </figure>
        <figure class="card" data-idx="24">
          <div class="thumb"><img src="https://images.pexels.com/photos/9259962/pexels-photo-9259962.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 25" loading="lazy"><span class="badge">25</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption> In small amounts, it is nothing more than harmless waste, passing quietly through the body on its way out.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> small glass vial pale bile sample 1980s clinic</div></figcaption>
        </figure>
        <figure class="card" data-idx="25">
          <div class="thumb"><img src="https://images.pexels.com/photos/9628834/pexels-photo-9628834.jpeg?auto=compress&amp;cs=tinysrgb&amp;dpr=2&amp;h=650&amp;w=940" alt="Scene 26" loading="lazy"><span class="badge">26</span><span class="lane-badge lane-stock">stock</span></div>
          <figcaption>
But bilirubin has one stubborn property, and that property is the seed of this entire story.<div class="scene-type">modern_scientific</div><div class="basis basis-search"><span class="basis-label">Search:</span> amber reagent bottle yellow pigment 1980s laboratory</div></figcaption>

source-image-gen/fc-01KX6JXSY1N69XRH5FZGJE4EG0/0.png", "snippet": "A rare mistake from one founder becomes a common thread woven through everyone who descends from them.", "n": 153, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Amish-style family quilt with interwoven patterns representing lineage, 20th century Lancaster County", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JXVBVV1DFKTPHWS9PE24V/0.png", "snippet": "So a typo that is nearly invisible out in the wider world becomes far more common inside this one community.", "n": 154, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Antique family Bible open on a farmhouse table, Lancaster County Amish, 20th century", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JXVBERNAN7N9SX6JF2REA/0.png", "snippet": "And now two carriers are much more likely to find each other, because in a real sense, many of them are distant cousins, sharing some long-ago common ancestor.", "n": 155, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Handwritten family genealogy chart on a kitchen table, Amish Mennonite families, 20th century", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JXW0D02BN3MTXB637YX4N/0.png", "snippet": "And when two carriers do marry and have a child, that child carries a real, meaningful chance of inheriting both broken copies, and being born with the full condition.", "n": 156, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Newborn wrapped in a plain cotton blanket in a wooden cradle, Amish farmhouse, Lancaster County", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://images.pexels.com/photos/9574332/pexels-photo-9574332.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "Researchers have actually traced the specific change behind most of these cases. It is a single, precise alteration in the U G T one A one gene, a change so exact that scientists can write it down as one swapped letter in the long genetic code.", "n": 157, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "researcher holding DNA vial genetics lab 1990s", "basis_kind": "search", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-graphics/003e2e3327b269e80ade0d310b8caeb2.png", "snippet": "And they believe this exact same change entered the Amish lines and the Mennonite lines separately.", "n": 158, "lane": "graphic-document", "scene_type": "document", "named_entity": "", "image_basis": "close-up three-quarter angle of an aged parchment historical document on a table, period-accurate legible handwriting or typography, aged paper texture, no photographs, no modern elements. Strictly family-friendly: no gore, no blood, no graphic violence, no disturbing imagery. Folded 19th century passenger manifest on a table, Anabaptist immigrants to Pennsylvania, 19th century", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JY210ZYFTJT3233DB6HN8/0.png", "snippet": "They believe it is old, far older even than the Anabaptist faith itself, carried quietly across the ocean inside those founding families, hidden in their blood, without anyone alive ever knowing it was there.", "n": 159, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Wooden sea chest with leather straps on a dock, 19th century immigrant belongings arriving to Pennsylvania", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://images.pexels.com/photos/14977528/pexels-photo-14977528.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "That is the cruel elegance at the center of this.", "n": 160, "lane": "stock", "scene_type": "geographic", "named_entity": "", "image_basis": "red bank barn Lancaster County farmhouse night 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/38164471/pexels-photo-38164471.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "The very closeness that protected this community's way of life also, by the same mechanism, concentrated a hidden risk in their bloodlines.", "n": 161, "lane": "stock", "scene_type": "geographic", "named_entity": "", "image_basis": "Lancaster County wooden farmhouses 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-graphics/226822f5528975a8cf544aeba377b286.png", "snippet": "And it is not only Crigler-Najjar.", "n": 162, "lane": "graphic-document", "scene_type": "document", "named_entity": "", "image_basis": "close-up three-quarter angle of an aged parchment historical document on a table, period-accurate legible handwriting or typography, aged paper texture, no photographs, no modern elements. Strictly family-friendly: no gore, no blood, no graphic violence, no disturbing imagery. open pediatric medical textbook on a table, yellowed pages, 1980s clinic", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://images.pexels.com/photos/37383973/pexels-photo-37383973.jpeg?auto=com ation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JYSZ53QGS9XQMSE6PC249/0.png", "snippet": "And in the course of his work, he came across an Amish child suffering from one of these conditions, an inherited disorder that almost no ordinary doctor would have recognized.", "n": 178, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Amish child seated in a wooden farmhouse interior, 1980s Lancaster County, Pennsylvania", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-graphics/41a0423c3aafd5cf8a3db51405e9b0d1.png", "snippet": "Most physicians might have written it off as a strange one-off, a medical curiosity, and quietly moved on with their day.", "n": 179, "lane": "graphic-document", "scene_type": "document", "named_entity": "", "image_basis": "close-up three-quarter angle of an aged parchment historical document on a table, period-accurate legible handwriting or typography, aged paper texture, no photographs, no modern elements. Strictly family-friendly: no gore, no blood, no graphic violence, no disturbing imagery. doctor's leather casebook open on a clinic table, 1980s small-town Pennsylvania", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JZ2G4A9MERSM9AY4XST0W/0.png", "snippet": "Morton did the exact opposite.", "n": 180, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "Morton", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, male medical researcher portrait holding papers, 1980s Pennsylvania medical office", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-graphics/e01f1f4daa46be10b724cb8bb342bad8.png", "snippet": "He started looking.", "n": 181, "lane": "graphic-document", "scene_type": "document", "named_entity": "", "image_basis": "close-up three-quarter angle of an aged parchment historical document on a table, period-accurate legible handwriting or typography, aged paper texture, no photographs, no modern elements. Strictly family-friendly: no gore, no blood, no graphic violence, no disturbing imagery. doctor's notebook and stethoscope on a farmhouse wooden table, 1980s Lancaster County", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-graphics/03b936796d26a6c1540e98e2a60b5c36.png", "snippet": "And the moment he looked, he found more.", "n": 182, "lane": "graphic-document", "scene_type": "document", "named_entity": "", "image_basis": "close-up three-quarter angle of an aged parchment historical document on a table, period-accurate legible handwriting or typography, aged paper texture, no photographs, no modern elements. Strictly family-friendly: no gore, no blood, no graphic violence, no disturbing imagery. stacked medical case files on a wooden desk, 1980s small medical office Pennsylvania", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JZ9HJFF8FWPBD98CW3ZM6/0.png", "snippet": "More children, in the same communities, carrying the same rare conditions, suffering quietly because the diseases were so rare in the wider world that no normal clinic was even watching for them.", "n": 183, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Amish children standing by a red bank barn and wooden fence, 1980s Lancaster County farmland", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-archival/12bcf195af20666d26d1a0f3b866a75a.jpg", "snippet": "The pattern had always been there.", "n": 184, "lane": "archival", "scene_type": "geographic", "named_entity": "Lancaster County", "image_basis": "Lancaster County red bank barns 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/37383973/pexels-photo-37383973.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "It had simply been waiting for someone to notice.", "n": 185, "lane": "stock", "scene_type": "geographic", "named_entity": "", "image_basis": "red bank barn Lancaster County 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-archival/d15e2cc8d1b4b646c10642a87df1bd96.jpg", "snippet": "So in nineteen eighty-nine, Morton and his wife Caroline did something genuinely unusual. Instead of asking these farm families to make long, difficult journeys to distant big-city hospitals, places that were unfamiliar and far from home, they decided to bring the medicine to the community instead. They founded a small nonprofit clinic right in the heart of Lancaster County's Plain country, in the town of Strasburg, Pennsylvania, and they named it the Clinic for Special Children.", "n": 186, "lane": "archival", "scene_type": "historical_dramatic", "named_entity": "Clinic for Special Children", "image_basis": "physician with plain community Lancaster County 1989", "basis_kind": "search", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JZEZNCZX4GQJ774RTZN4Q/0.png", "snippet": "And the way it came to be says everything about the bond between the doctor and the people he served.", "n": 187, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Doctor clasping hands with Amish and Mennonite family outside farmhouse, 1980s Lancaster County", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JZGGRYM7H8N11MXNA41MT/0.png", "snippet": "The clinic was built with direct help from the Amish", "n": 188, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Amish men working on a barn-raising platform in Lancaster County farmland, 1980s", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JZHR3G0CTXW4MHQ9N943S/0.png", "snippet": "and Mennonite families themselves, who raised money for it in their own time-honored way, through community benefit auctions, much like the barn raisings that have always defined them.", "n": 189, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Mennonite families gathered at a community benefit auction in Lancaster County, 1980s", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-archival/a80d850ecfb31a3a342064a276f2727b.jpg", "snippet": "The finished clinic sat, fittingly, in a field, a modern genetics laboratory surrounded on every side by farmland,", "n": 190, "lane": "archival", "scene_type": "historical_dramatic", "named_entity": "Strasburg", "image_basis": "genetics laboratory small exterior Pennsylvania rural 1990s", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/34923003/pexels-photo-34923003.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": " grazing horses,", "n": 191, "lane": "stock", "scene_type": "geographic", "named_entity": "", "image_basis": "grazing horse Lancaster County pasture 1 ", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/3908181/pexels-photo-3908181.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "Catch the condition early, name it fast, and you can act before the bilirubin ever climbs high enough to reach the brain.", "n": 200, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "bilirubin blood sample vial 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JZWDFFQ1GNTTWPP824E9H/0.png", "snippet": "That early, certain diagnosis is the first half of saving these children.", "n": 201, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Amish parents holding a newborn wrapped in a plain blanket outside a farmhouse, Lancaster County, 1980s\u20131990s", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://images.pexels.com/photos/37165990/pexels-photo-37165990.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "It is the half almost no one had before the clinic existed.", "n": 202, "lane": "stock", "scene_type": "geographic", "named_entity": "", "image_basis": "Lancaster County farmhouse exterior 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6JZWTCXCZW67V1ERJ2HQDJ/0.png", "snippet": "The second half is the blue light.", "n": 203, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Amish farmhouse nursery with a small lamp glowing blue near a crib, Lancaster County 1980s", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://yt-heritage-media.s3.us-west-2.amazonaws.com/heritage-archival/6d2ca5c165c2aff53e6c921861f743bf.jpg", "snippet": "So now we come all the way back to that glowing bedroom in Lancaster County. And now, finally, you understand what the light is actually doing in there.", "n": 204, "lane": "archival", "scene_type": "historical_dramatic", "named_entity": "Lancaster County", "image_basis": "Lancaster County bedroom with crib 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/4557263/pexels-photo-4557263.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "If the liver simply cannot tag bilirubin for removal, then doctors needed to find another road, another way to get the bilirubin out of the body that skips the broken enzyme entirely.", "n": 205, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "anatomical liver model 1980s clinic", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/19679314/pexels-photo-19679314.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "And the answer they found turned out to be light.", "n": 206, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "phototherapy unit 1980s hospital", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/8872429/pexels-photo-8872429.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "Not just any light.", "n": 207, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "phototherapy lamp 1980s hospital", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/31386380/pexels-photo-31386380.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "Intense blue light, tuned to a very precise color, in a range near a wavelength of four hundred and fifty nanometers.", "n": 208, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "450 nm phototherapy panel 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/3570072/pexels-photo-3570072.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "That exact shade is the one that bilirubin soaks up best, the color it drinks in most hungrily.", "n": 209, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "electric-blue hospital phototherapy lamp 1990s", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/30022587/pexels-photo-30022587.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "And here is the part that feels almost like magic, except that it is pure, honest physics.", "n": 210, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "newborn baby skin clinical close-up 1990s-present", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/11947827/pexels-photo-11947827.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "When that blue light shines onto the skin, it passes down to reach the bilirubin sitting just beneath the surface.", "n": 211, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "newborn under phototherapy blue light clinic 1990s-present", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/3825572/pexels-photo-3825572.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "The energy carried in the light rearranges those bilirubin molecules, reshaping them into a different form.", "n": 212, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "bilirubin molecular model plastic tabletop clinical", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/11516498/pexels-photo-11516498.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "And this new form is the key to the whole thing.", "n": 213, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "modified bilirubin molecular model clinical prop", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/13060613/pexels-photo-13060613.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "It does not need the liver's tag at all.", "n": 214, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "bilirubin isomer model without conjugation tag clinical", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/13466248/pexels-photo-13466248.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "It is already water-friendly, all on its own.", "n": 215, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "water-soluble bilirubin model clinical illustration", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/33508363/pexels-photo-33508363.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "So the body can finally do what it could never do before.", "n": 216, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "nurse caring for newborn in hospital nursery 1990s\u2013present", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/11947841/pexels-photo-11947841.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "It can pour that rearranged bilirubin into bile and flush it safely out.", "n": 217, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "jaundiced newborn skin hospital 1980s Pennsylvania", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/8872429/pexels-photo-8872429.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "In other words, the blue light does the one job that the broken enzyme cannot.", "n": 218, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "blue phototherapy lamp hospital 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://images.pexels.com/photos/8872429/pexels-photo-8872429.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940", "snippet": "It takes a trapped poison and turns it into something the body can finally release.", "n": 219, "lane": "stock", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "blue phototherapy lamp hospital 1980s", "basis_kind": "search", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6K04MAGVAEZJ6S5KXW4G4P/0.png", "snippet": "The light becomes the handyman who never showed up.", "n": 220, "lane": "krea", "scene_type": "modern_scientific", "named_entity": "", "image_basis": "realistic documentary still, clean laboratory photography, natural light, Portable blue phototherapy unit standing beside a newborn bassinet, Lancaster County 1980s", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6K04EFBV00Z1BBDZW0TK3T/0.png", "snippet": "But there is a catch, and it is a heavy one to carry.", "n": 221, "lane": "krea", "scene_type": "historical_dramatic", "named_entity": "", "image_basis": "cinematic 35mm film still, historical realism, rich organic textures, Amish mother in plain clothing carrying her infant outside a red bank barn, Lancaster County 1980s", "basis_kind": "prompt", "mood_designated": false}, {"url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KX6K04KW75MXTV9AP1KVEJNQ/0.png", "snippet": "Light can only reach the bilirubin that lies close to the surface of the skin.", "n": 222, "lane": "k   var modal = document.getElementById('modal');
  var modalImg = document.getElementById('modal-img');
  var modalCaption = document.getElementById('modal-caption');
  var modalSceneNum = document.getElementById('modal-scene-num');
  var modalLane = document.getElementById('modal-lane');
  var modalMeta = document.getElementById('modal-meta');
  var modalBasis = document.getElementById('modal-basis');
  var modalMood = document.getElementById('modal-mood');

  function openModal(idx) {
    var s = SCENES[idx];
    if (!s || !s.url) return;
    modalImg.src = s.url;
    modalImg.alt = 'Scene ' + s.n;
    modalCaption.textContent = s.snippet;
    modalSceneNum.textContent = 'Scene ' + s.n;
    modalLane.className = 'lane-badge ' + (s.lane ? 'lane-' + s.lane : 'lane-none');
    modalLane.textContent = s.lane || '—';
    modalMood.style.display = s.mood_designated ? '' : 'none';
    var metaParts = [];
    if (s.scene_type) metaParts.push(s.scene_type);
    if (s.named_entity) metaParts.push(s.named_entity);
    modalMeta.textContent = metaParts.join(' · ');
    if (s.image_basis) {
      var label = s.basis_kind === 'search' ? 'Search' : 'Prompt';
      modalBasis.textContent = '';
      var labelSpan = document.createElement('span');
      labelSpan.className = 'basis-label';
      labelSpan.textContent = label + ': ';
      modalBasis.appendChild(labelSpan);
      modalBasis.appendChild(document.createTextNode(s.image_basis));
      modalBasis.style.display = '';
    } else {
      modalBasis.textContent = '';
      modalBasis.style.display = 'none';
    }
    modal.classList.add('open');
  }

  function closeModal() {
    modal.classList.remove('open');
    modalImg.src = '';
  }

  document.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('click', function() {
      openModal(parseInt(card.getAttribute('data-idx'), 10));
    });
  });

  document.querySelector('#modal .close').addEventListener('click', closeModal);

  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });
