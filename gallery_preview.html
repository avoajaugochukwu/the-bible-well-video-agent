<style>
  :root {

    --accent: #c9973f;
    --lane-archival: #c9973f;
    --lane-stock: #4fa8a0;
    --lane-graphic: #8b7cc9;
    --lane-krea: #c0654a;
    --mood: #5fb26a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    padding: 32px 24px 64px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--accent);
  }
  p.sub {
    margin: 0 0 28px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    margin: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }
  .card.mood-designated {
    border-color: var(--mood);
    box-shadow: 0 0 0 1px var(--mood);
  }
  .mood-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: var(--mood);
    color: #0d1a0f;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #0c0a08;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb .missing {
    color: #8a5a4a;
    font-size: 0.85rem;
    font-style: italic;
  }
  .badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.65);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  figcaption {
    padding: 12px 14px 16px;
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text);
  }
  figcaption .scene-type {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  figcaption .basis {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
    line-height: 1.4;
  }
  figcaption .basis-label {
    color: var(--accent);
    font-style: normal;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.03em;
  }
  .lane-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #14110f;
    background: var(--muted);
  }
  .thumb .lane-badge {
    position: absolute;
    top: 8px;
    right: 8px;
  }
  .lane-badge.lane-archival { background: var(--lane-archival); }
  .lane-badge.lane-stock { background: var(--lane-stock); }
  .lane-badge.lane-graphic-map { background: var(--lane-graphic); }

    text-align: center;

    text-transform: uppercase;

    color: var(--text);
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
