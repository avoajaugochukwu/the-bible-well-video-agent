<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gouache Illustration Krea Test</title>
<style>
  body { margin:0; padding:24px; background:#111; color:#eee; font-family:-apple-system,sans-serif; }
  h1 { font-size:18px; font-weight:600; margin-bottom:16px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .card { background:#1c1c1c; border-radius:8px; overflow:hidden; cursor:pointer; }
  .card img { width:100%; display:block; aspect-ratio:16/9; object-fit:cover; }
  .card p { margin:0; padding:10px 12px; font-size:12px; color:#aaa; }
  dialog { border:none; background:transparent; max-width:90vw; }
  dialog img { max-width:90vw; max-height:90vh; border-radius:8px; }
  dialog::backdrop { background:rgba(0,0,0,0.85); }
</style>
</head>
<body>
<h1>Gouache / storybook illustration style test — 10 images</h1>
<div class="grid" id="grid"></div>
<dialog id="modal"><img id="modal-img" src=""></dialog>
<script>
const images = [{"prompt": "a young woman in a cozy sunlit kitchen holding a fresh cup of coffee, smiling warmly", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBKYHD60FKQCABTRAAKEW4Y/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a young woman in a cozy sunlit kitchen holding a fresh cup of coffee, smiling warmly"}, {"prompt": "a man reading a book on a park bench under autumn trees, golden hour light", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBM7T8BGVVPKF9BYP6TGX7A/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a man reading a book on a park bench under autumn trees, golden hour light"}, {"prompt": "a little girl planting flowers in a garden, sunlight streaming through leaves", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBKYHM2Q0VCGZHTKF1HH811/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a little girl planting flowers in a garden, sunlight streaming through leaves"}, {"prompt": "an elderly couple walking hand in hand along a quiet beach at sunset", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBKYHANG8X0YB77RXP5H0SM/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, an elderly couple walking hand in hand along a quiet beach at sunset"}, {"prompt": "a teenage boy fixing his bicycle in a driveway on a bright summer morning", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBKYHS1RYGD9AMN4MET2KEN/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a teenage boy fixing his bicycle in a driveway on a bright summer morning"}, {"prompt": "a woman journaling by a rain-streaked window with a warm mug of tea", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBKYHPK9B6R1B2TAK5BNN1R/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a woman journaling by a rain-streaked window with a warm mug of tea"}, {"prompt": "a family gathered around a dinner table laughing together, warm indoor lighting", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBM6B28A93Z2JGPXVNCJSHM/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a family gathered around a dinner table laughing together, warm indoor lighting"}, {"prompt": "a hiker standing on a mountain overlook at sunrise, arms outstretched", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBM6D94K9SKBV71G4CQ7W0J/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a hiker standing on a mountain overlook at sunrise, arms outstretched"}, {"prompt": "a child building a sandcastle on a beach with waves in the background", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBM6DKMAATKV6EV43M4WH7R/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a child building a sandcastle on a beach with waves in the background"}, {"prompt": "a young man praying quietly in a sunlit chapel, dust motes in the light beams", "url": "https://open-source-image-generation.s3.us-west-2.amazonaws.com/generations/open-source-image-gen/fc-01KXBM6J29M9K5X62NX1VKCW6N/0.png", "full_prompt": "painterly digital illustration, semi-realistic vintage travel-poster illustration style, detailed visible brushstrokes, rich painted texture, naturalistic proportions and detailed facial features, soft painted light and shadow, warm nostalgic color palette, not flat vector art, not simplified cartoon shapes, a young man praying quietly in a sunlit chapel, dust motes in the light beams"}];
const grid = document.getElementById('grid');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');
images.forEach(img => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${img.url}" loading="lazy"><p>${img.full_prompt}</p>`;
  card.onclick = () => { modalImg.src = img.url; modal.showModal(); };
  grid.appendChild(card);
});
modal.onclick = () => modal.close();
</script>
</body>
</html>
